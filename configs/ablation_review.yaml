eps_list: [0.2, 0.5, 0.8, 1.0, 1.5]
seeds: [0, 1, 2, 3, 4]
T: 20
clip_B: 3.0
proxy_eps_ratio: 0.1
proxy_eps_min: 0.15
proxy_after_reduction: true
proxy_init_frac: 0.5
proxy_init_min: 1500
proxy_init_mode: point_noise
proxy_rr_restarts: 10
collapse_min_ratio: 0.01
jobs: 12
budget:
  mode: feedback_v3
  warmup: 3
  beta: 0.8
  gamma: 1.0
  drift_clip: 3.0
  fixed:
    low_mult: 2.0
    high_mult: 3.2
  collapse_boost: 1.3
  collapse_threshold: 0.55
  eps_cap: null
  strong_low_frac: 0.7
  strong_eps_min_ratio: 0.3
  datasets:
    gas:
      fixed:
        low_mult: 1.8
        high_mult: 3.6
      collapse_boost: 1.3
      collapse_threshold: 0.6

datasets:
  har:
    root: "./UCI HAR Dataset"
    k: 6
    pus_top_m: 128
    pca_r: 64
    d_sub_list: [561]
  gas:
    root: "./gas"
    k: 6
    pus_top_m: 64
    pca_r: 32
  synthetic:
    k: 10
    n_list: [1000, 5000, 10000]
    d_list: [128, 256, 512]

methods:
  [
    sahdpca_fb_v3,
    sahdpca_proxy_kpp,
    sahdpca_proxy_rr,
    sahdpca_pca_only,
    sahdpca_rand_feat,
    sahdpca_fb_v2,
    sahdpca_wo_feedback,
    sahdpca_strong,
  ]

experiments:
  ea:
    datasets: [har, gas]
    methods: [sahdpca_fb_v3, sahdpca_proxy_kpp, sahdpca_proxy_rr]
    eps_list: [0.2, 0.5, 0.8, 1.0, 1.5]
    seeds: [0, 1, 2, 3, 4]
  eb:
    datasets: [har, gas]
    methods: [sahdpca_fb_v3, sahdpca_pca_only, sahdpca_rand_feat]
    eps_list: [0.2, 0.5, 0.8, 1.0, 1.5]
    seeds: [0, 1, 2, 3, 4]
  ec:
    datasets: [har, gas]
    methods: [sahdpca_fb_v3, sahdpca_fb_v2, sahdpca_wo_feedback, sahdpca_strong]
    eps_list: [0.2, 0.5, 0.8, 1.0, 1.5]
    seeds: [0, 1, 2, 3, 4]
